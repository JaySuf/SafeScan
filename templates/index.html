<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeScan - IoT Security</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: 'Courier New', monospace; text-align: center; background-color: #121212; color: white; margin: 0; padding: 20px; }
        h1 { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 2px solid #333; }
        #result-box { margin-top: 20px; padding: 20px; border-radius: 10px; display: none; }
        .safe { background-color: #1b5e20; border: 2px solid #00e676; }
        .danger { background-color: #b71c1c; border: 2px solid #ff1744; animation: shake 0.5s; }
        .btn { padding: 10px 20px; margin-top: 10px; background: #333; color: white; border: none; cursor: pointer; }
        
        /* Animasi Getar Visual */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <h1>SafeScan <span style="font-size:0.5em">CybNet-IoT</span></h1>
    <p>Arahkan kamera ke QR Code</p>
    
    <div id="reader"></div>

    <div id="result-box">
        <h2 id="status-text">MENGANALISIS...</h2>
        <p id="url-text">URL</p>
        <button class="btn" onclick="location.reload()">SCAN ULANG</button>
    </div>

    <script>
        // --- LOGIKA SCANNER ---
        function onScanSuccess(decodedText, decodedResult) {
            // Hentikan kamera setelah dapat hasil
            html5QrcodeScanner.clear();
            
            // Tampilkan status loading
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('result-box').className = ''; 
            document.getElementById('status-text').innerText = "MEMERIKSA DATABASE...";
            document.getElementById('url-text').innerText = decodedText;

            // Kirim ke Python (Server)
            fetch('/scan_api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: decodedText })
            })
            .then(response => response.json())
            .then(data => {
                const box = document.getElementById('result-box');
                const statusText = document.getElementById('status-text');

                if (data.status === "AMAN") {
                    // RESPON IOT 1: Tampilan Hijau
                    box.className = 'safe';
                    statusText.innerText = "✅ LINK AMAN";
                } else {
                    // RESPON IOT 2: Tampilan Merah + GETAR (Vibrate)
                    box.className = 'danger';
                    statusText.innerText = "⛔ BERBAHAYA / PHISHING";
                    
                    // Fitur IoT: Getarkan HP (Pola: getar 500ms, diam 200ms, getar 500ms)
                    if (navigator.vibrate) {
                        navigator.vibrate([500, 200, 500]);
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Gagal terhubung ke Server Laptop");
            });
        }

        let config = { fps: 10, qrbox: { width: 250, height: 250 } };
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", config, false);
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
